name: Validate Secrets

# Fast (~30s) health check of the API keys stored in repo Secrets.
# Runs on GitHub's runners, which CAN reach Supabase / Groq / GLM,
# so it can confirm each key is valid and print a clear PASS/FAIL.
# Trigger from the Actions tab -> "Validate Secrets" -> Run workflow.

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check keys
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GLM_API_KEY:  ${{ secrets.GLM_API_KEY }}
        run: |
          python -m pip install --quiet httpx
          python - <<'PY'
          import os, httpx

          def line(name, ok, extra=""):
              print(f"{'PASS' if ok else 'FAIL'}  {name}  {extra}")

          # ---- Supabase ----
          url = (os.getenv("SUPABASE_URL") or "").rstrip("/")
          key = os.getenv("SUPABASE_KEY") or ""
          if not url or not key:
              line("SUPABASE", False, "URL or KEY secret missing")
          else:
              try:
                  r = httpx.get(
                      f"{url}/rest/v1/auction_properties?select=id&limit=1",
                      headers={"apikey": key, "Authorization": f"Bearer {key}"},
                      timeout=20,
                  )
                  line("SUPABASE", r.status_code < 400,
                       f"HTTP {r.status_code} (key ...{key[-6:]}, len {len(key)})")
                  if r.status_code >= 400:
                      print("   response:", r.text[:200])
              except Exception as e:
                  line("SUPABASE", False, str(e))

          # ---- Groq ----
          gk = os.getenv("GROQ_API_KEY") or ""
          if not gk:
              line("GROQ", False, "secret missing (free 14,400/day key from console.groq.com)")
          else:
              try:
                  r = httpx.post(
                      "https://api.groq.com/openai/v1/chat/completions",
                      headers={"Authorization": f"Bearer {gk}",
                               "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120 Safari/537.36"},
                      json={"model": "llama-3.3-70b-versatile",
                            "messages": [{"role": "user", "content": "ping"}],
                            "max_tokens": 3},
                      timeout=25,
                  )
                  line("GROQ", r.status_code < 400, f"HTTP {r.status_code}")
                  if r.status_code >= 400:
                      print("   response:", r.text[:160])
              except Exception as e:
                  line("GROQ", False, str(e))

          # ---- GLM ----
          lk = os.getenv("GLM_API_KEY") or ""
          if not lk:
              line("GLM", False, "secret missing")
          else:
              try:
                  r = httpx.post(
                      "https://api.z.ai/api/paas/v4/chat/completions",
                      headers={"Authorization": f"Bearer {lk}"},
                      json={"model": "glm-5.2",
                            "messages": [{"role": "user", "content": "ping"}],
                            "max_tokens": 3},
                      timeout=25,
                  )
                  line("GLM", r.status_code < 400, f"HTTP {r.status_code} (429 = rate-limited)")
              except Exception as e:
                  line("GLM", False, str(e))
          PY
